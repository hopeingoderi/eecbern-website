
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Prayer Request | EEC Bern</title>
<link href="/assets/css/styles.css" rel="stylesheet"/>
</head>
<body>
<header>
<div class="container navbar">
<a class="brand" href="/"><strong>EEC Bern</strong></a>

<label aria-label="Language switch" class="lang-switch lang-switch--compact">
<select class="languageSelect" id="languageSelect">
<option value="en">EN</option>
<option value="de">DE</option>
<option value="ti">TI</option>
</select>
</label>
</div>
</header>
<main class="section">
<div class="container">
<p class="kicker">PRAYER</p>
<h1>Send a Prayer Request</h1>
<p class="lead">We would be honored to pray for you.</p>
<form class="prayer-form">
<input placeholder="Your Name"/>
<input placeholder="Email"/>
<textarea placeholder="Your Prayer Request"></textarea>
<button class="btn btn-small nav-donate">Send Prayer Request</button>
</form>
</div>
</main>
</body>
</html>
