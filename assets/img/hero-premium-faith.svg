<text x="120" y="170" font-family="Arial, Helvetica, sans-serif" font-size="26" letter-spacing="8" fill="#f3d7a1">EEC BERN · HOME OF HOPE</text>
<text x="120" y="300" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" fill="#ffffff">A place of grace,</text>
<text x="120" y="395" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" fill="#ffffff">peace, and</text>
<text x="120" y="490" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" fill="#ffffff">spiritual renewal</text>
<text x="120" y="595" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#eef4f7">A church home in Bern where the weary find rest,</text>
<text x="120" y="642" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#eef4f7">the burdened discover hope, and hearts are lifted toward Christ.</text>
