<text x="855" y="975" text-anchor="middle" class="sans cellText">14:00 – 15:20</text>
<text x="1175" y="975" text-anchor="middle" class="sans cellText">Room B</text>

<rect x="260" y="1070" width="400" height="132" rx="18" class="whiteBox"/>
<rect x="680" y="1070" width="350" height="132" rx="18" class="whiteBox"/>
<rect x="1048" y="1070" width="255" height="132" rx="18" class="cyanBox"/>
<text x="460" y="1135" text-anchor="middle" class="sans cellText">Main Worship Service</text>
<text x="855" y="1145" text-anchor="middle" class="sans cellText">15:30 – 18:30</text>
<text x="1175" y="1130" text-anchor="middle" class="sans cellText">Main</text>
<text x="1175" y="1180" text-anchor="middle" class="sans cellText">Hall</text>
</svg>