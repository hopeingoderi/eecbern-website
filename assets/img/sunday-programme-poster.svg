<text x="855" y="805" text-anchor="middle" class="sans cellText">14:30 – 15:20</text>
<text x="1175" y="805" text-anchor="middle" class="sans cellText">Room D</text>

<rect x="260" y="900" width="400" height="132" rx="18" class="whiteBox"/>
<rect x="680" y="900" width="350" height="132" rx="18" class="whiteBox"/>
<rect x="1048" y="900" width="255" height="132" rx="18" class="cyanBox"/>
